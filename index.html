<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Apexean Dev Studio Tools</title>
	<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/media/hls-video.js"></script>
	<script src="https://kit.fontawesome.com/f193b234bb.js" crossorigin="anonymous"></script>

</head>
<body style="background:black; color:white; text-align:center; font-family:Lucida Sans Unicode, sans-serif;">
	<wa-button appearance="filled-outlined" variant="neutral" href="https://apexean.github.io/"><i class="fa-regular fa-house"></i>Home</wa-button>
	<h1>Welcome to the Apexean Dev Studio Tools page!</h1>
	<p>All of these tools are designed to help you develop and deploy your Roblox games, emotes, and UGC more efficiently.</p>
		<h2>ApexeanU3D</h2>
	    <video width="640" height="360" controls autoplay muted loop>
        <!-- Multiple sources for browser compatibility -->
        <source src="SiteStuff/U3D Advert 1.mp4" type="video/mp4">
        
        <!-- Fallback text for unsupported browsers -->
        Your browser does not support the HTML5 video tag.
    </video>
	<!-- All components inside automatically connect to state -->
<!--
  The PlayerProvider passes state between the UI components
  and Media, and makes fully custom UIs possible.
  It does not have layout by default (display:contents)
 -->
<h2>Webby [Microsoft Edge Based Browser, ALPHA as it may contain BUGS.]</h2>
<video-player>
  <!--
    Skins contain the entire player UI and are easily swappable.
    They can each be "ejected" for full control and customization
    of UI components.
   -->
  <video-skin>
    <!--
      Media are players without UIs, handling networking
      and display of the media. They are easily swappable
      to handle different sources.
    -->
    <hls-video src="https://stream.mux.com/oucapbKg00FVuOaiWYl5r2a2bmJdCp01zchIsrj2X9a9k.m3u8" playsinline></hls-video>
  </video-skin>
</video-player>
</body>
</html>
